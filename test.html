            text-decoration: none; background: #555; color: white; padding: 10px;

let currentLang = localStorage.getItem("lang") || "az";
let userAnswers = new Array(10).fill(0);

const quizContainer = document.getElementById("quiz");
const langSelect = document.getElementById("langSelect");

function renderQuiz() {
    quizContainer.innerHTML = "";
    const langData = languages[currentLang];
    
    // Ümumi düymələrin tərcüməsi
    document.getElementById("backbtn").innerText = langData.back;
    document.getElementById("retryBtn").innerText = langData.retry;

    langData.questions.forEach((q, index) => {
        const qDiv = document.createElement("div");
        qDiv.className = `question ${index === 0 ? 'active' : ''}`;
        qDiv.id = `q-${index}`;

        qDiv.innerHTML = `<h3>${q.q}</h3>`;
        
        const ansDiv = document.createElement("div");
        ansDiv.className = "answers";

        q.a.forEach((option, i) => {
            const btn = document.createElement("button");
            btn.innerText = option;
            // Əgər əvvəlcədən seçilibsə rənglə
            if(userAnswers[index] === i + 1) btn.classList.add("selected");
            
            btn.onclick = () => {
                userAnswers[index] = i + 1;
                const buttons = ansDiv.querySelectorAll("button");
                buttons.forEach(b => b.classList.remove("selected"));
                btn.classList.add("selected");
            };
            ansDiv.appendChild(btn);
        });

        qDiv.appendChild(ansDiv);

        const navDiv = document.createElement("div");
        navDiv.className = "nav";

        if (index > 0) {
            const prevBtn = document.createElement("button");
            prevBtn.innerText = langData.prev;
            prevBtn.onclick = () => navigate(index, index - 1);
            navDiv.appendChild(prevBtn);
        }

        const nextBtn = document.createElement("button");
        if (index < langData.questions.length - 1) {
            nextBtn.innerText = langData.next;
            nextBtn.onclick = () => navigate(index, index + 1);
        } else {
            nextBtn.innerText = langData.finish;
            nextBtn.style.background = "#4CAF50";
            nextBtn.onclick = finishQuiz;
        }
        navDiv.appendChild(nextBtn);

        qDiv.appendChild(navDiv);
        quizContainer.appendChild(qDiv);
    });
}

function navigate(current, next) {
    // İrəli gedəndə cavab seçilibsə icazə ver
    if (next > current && userAnswers[current] === 0) {
        alert(languages[currentLang].alert);
        return;
    }
    document.getElementById(`q-${current}`).classList.remove("active");
    document.getElementById(`q-${next}`).classList.add("active");
}

function finishQuiz() {
    if (userAnswers.includes(0)) {
        alert(languages[currentLang].alert);
        return;
    }
    
    let sum = userAnswers.reduce((a, b) => a + b, 0);
    // Numeroloji hesablama (xalları tək rəqəmə endir)
    while (sum > 10) {
        sum = sum.toString().split("").reduce((a, b) => a + Number(b), 0);
    }
    
    const result = languages[currentLang].results[sum - 1] || languages[currentLang].results[0];
    
    quizContainer.style.display = "none";
    document.querySelector(".buttons").style.display = "none";
    
    const resDiv = document.getElementById("result");
    resDiv.style.display = "block";
    document.getElementById("resTitle").innerText = result.title;
    document.getElementById("resDesc").innerText = result.desc;
    document.getElementById("resImage").src = result.img;
}

// Dil seçimi dəyişəndə
langSelect.value = currentLang;
langSelect.onchange = (e) => {
    currentLang = e.target.value;
    localStorage.setItem("lang", currentLang);
    renderQuiz(); // Bütün sualları və düymələri yeni dildə yenidən yaradır
};

// İlk başlanğıc
renderQuiz();
</script>
