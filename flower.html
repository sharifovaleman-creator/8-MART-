<html lang="az">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=Edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLOWER</title>
<style>
  body {margin:0;font-family:sans-serif;background:#fff;}
  .top-bar {display:flex;justify-content:flex-end;padding:15px;}
  #langSelect {font-size:16px;padding:5px 10px;border-radius:8px;}
  .container {max-width:500px;margin:auto;padding:20px;text-align:center;}
  input, button {padding:10px;font-size:16px;margin:10px 0;border-radius:8px;border:1px solid #ccc;}
  button {background:#e91e63;color:white;border:none;cursor:pointer;}
  button:hover {opacity:0.9;}
  .result {margin-top:20px;}
  .result img {width:80%;border-radius:12px;margin-bottom:10px;}
  .result p {font-size:16px;color:#444;}
  .buttons {display:flex;flex-direction:column;gap:15px;padding:20px;}
  .buttons a {text-decoration:none;background:#e91e63;color:white;padding:15px;text-align:center;border-radius:12px;box-shadow:0 6px 15px rgba(0,0,0,0.2);transition:0.2s;}
  .buttons a:hover {transform:translateY(-3px);}
</style>
</head>
<body>

<div class="top-bar">
  <select id="langSelect">
    <option value="az">🇦🇿</option>
    <option value="en">🇬🇧</option>
    <option value="ru">🇷🇺</option>
    <option value="ge">🇬🇪</option>
    <option value="hy">🇦🇲</option>
  </select>
</div>

<div class="container">
  <h1 id="title">Hansı Çiçəksən?</h1>
  <input type="text" id="nameInput" placeholder="Adını yaz">
  <button id="checkBtn">Öyrən</button>

  <div class="result" id="result"></div>

  <div class="buttons">
    <a id="backbtn" href="index.html">geri</a>
  </div>
</div>

<script>

  ],
  en: [

    {name:"Orchid", text:"Elegant and unique."},
    {name:"Tulip", text:"Bright and energetic."},
    {name:"Daisy", text:"Simple and pure."},
    {name:"Lily", text:"Both delicate and strong."},
    {name:"Lavender", text:"Calming and romantic."},
    {name:"Peony", text:"Bold and vibrant."},
    {name:"Hydrangea", text:"Harmonious and friendly."},
    {name:"Sunflower", text:"Bright and positive."},
    {name:"Cherry Blossom", text:"Sensitive and beautiful."}
  ],
  ru: [
    {name:"Роза", text:"Романтичная и нежная."},
    {name:"Орхидея", text:"Элегантная и уникальная."},
    {name:"Тюльпан", text:"Яркая и энергичная."},
    {name:"Ромашка", text:"Простая и чистая."},
    {name:"Лилия", text:"И нежная, и сильная."},
    {name:"Лаванда", text:"Успокаивающая и романтичная."},
    {name:"Пион", text:"Смелая и яркая."},
    {name:"Гортензия", text:"Гармоничная и дружелюбная."},
    {name:"Подсолнух", text:"Светлая и позитивная."},
    {name:"Цветок вишни", text:"Чувствительная и красивая."}
  ],
  ge: [
    {name:"ვარდი", text:"რომანტიული და რბილი."},
    {name:"ორქიდეა", text:"ელეგანტური და უნიკალური."},
    {name:"ტიტიპანი", text:"ბრაითი და ენერგიული."},
    {name:"დაიზი", text:"სუფთა და მარტივი."},
    {name:"ლილია", text:"ზოგჯერ ნაზი, ზოგჯერ ძლიერი."},
    {name:"ლავანდა", text:"გაბალანსებული და რომანტიული."},
    {name:"პეონი", text:"მემამულე და მხიარული."},
    {name:"ჰიდრანჟა", text:"ჰარმონიული და მეგობრული."},
    {name:"მზესუმზირა", text:"ნათელი და პოზიტიური."},
    {name:"ყვავილი წითელი ხე", text:"პატარა და ლამაზი."}
  ],
  hy: [
    {name:"Ռոզա", text:"Ռոմանտիկ և մեղմ։"},
    {name:"Օրկիդեա", text:"Էլեգանտ և յուրահատուկ։"},
    {name:"Տյուլպան", text:"Լուսավոր և էներգիան։"},
    {name:"Սուրբ Հովաններ", text:"Պարզ և մաքուր։"},
    {name:"Սրամբակ", text:"Նուրբ և ուժեղ։"},
    {name:"Լավանդա", text:"Խաղաղ և ռոմանտիկ։"},
    {name:"Փիոն", text:"Ամբիցիոզ և պայծառ։"},
    {name:"Հիդրանջեա", text:"Հարմոնիկ և բարեկամական։"},
    {name:"Արևածաղիկ", text:"Լուսավոր և դրական։"},
    {name:"Խնձորի ծաղիկ", text:"Բարեհամբույր և գեղեցիկ։"}
  ]

// Əlifbalar
const alphabets = {
  az: "abcçdeəfgğhiıjklmnoöprsştuüvyz",
  en: "abcdefghijklmnopqrstuvwxyz",
  ru: "абвгдеёжзийклмнопрстуфхцчшщъыьэюя",
  ge: "აბგდევზთიკლმნოპჟრსტუფქღყშჩცძწჭხჯჰ",
  hy: "աբգդեեզ zxթժիյклմանոփքռսշուֆցքհ"
};

// UI dilləri
const translations = {
  az:{back:"geri", title:"Hansı Çiçəksən?", placeholder:"Adını yaz", button:"Öyrən"},
  en:{back:"back", title:"Which Flower Are You?", placeholder:"Enter your name", button:"Check"},
  ru:{back:"назад", title:"Какой ты цветок?", placeholder:"Введите имя", button:"Узнать"},
  ge:{back:"უკან", title:"რომელ ყვავილს ჰგავხარ?", placeholder:"შეიყვანეთ სახელი", button:"გაიგე"},
  hy:{back:"հետ", title:"Ո՞ր ծաղիկն ես դու", placeholder:"Մուտքագրիր անունը", button:"Դիտել"}
};

// Dil seçimi
const savedLang = localStorage.getItem("lang") || "az";
document.getElementById("langSelect").value = savedLang;

function applyUI(lang){
  document.getElementById("backbtn").textContent = translations[lang].back;
  document.getElementById("title").textContent = translations[lang].title;
  document.getElementById("nameInput").placeholder = translations[lang].placeholder;
  document.getElementById("checkBtn").textContent = translations[lang].button;
}

applyUI(savedLang);

document.getElementById("langSelect").addEventListener("change", function(){
  const lang = this.value;
  localStorage.setItem("lang", lang);
  applyUI(lang);
});

// Ad hesablaması
document.getElementById("checkBtn").addEventListener("click",function(){
  const name = document.getElementById("nameInput").value.toLowerCase();
  const lang = document.getElementById("langSelect").value;
  const alphabet = alphabets[lang];
  let total=0;
  for(let ch of name){
    const index = alphabet.indexOf(ch);
    if(index>=0) total+=index+1;
  }
  while(total>9) total = (total%10) + Math.floor(total/10);
  const flower = flowers[lang][total-1];
  document.getElementById("result").innerHTML = `<img src="flower${total}.jpg" alt="${flower.name}"><p>${flower.name}: ${flower.text}</p>`;
});
</script>

</body>
</html>
