<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>8 Mart</title>
  <style>
    body {
  margin: 0;
  font-family: sans-serif;
}
 @media (min-width:768px) {
  .buttons {
    max-width: 500px;
    margin: auto;
  }
 }
.buttons {
  display: flex;
  flex-direction: column;
  gap: 15px;
  padding: 20px;
}

.buttons a {
  text-decoration: none;
  background: #e91e63;
  color: white;
  padding: 15px;
  text-align: center;
  border-radius: 12px;
  box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
  transition: 0.2s;
}

.buttons a:hover {
  transform: translateY(-3px);
}
.top-bar {
  display: flex;
  justify-content: flex-end;
  padding: 15px;
}
#langSelect {
  font-size: 16px;
  padding: 5px 10px;
  border-radius: 8px;
}

  </style>
  
</head>

<body>
    <div class="top-bar">
    <select id="langSelect">
      <option value="az">🇦🇿</option>
      <option value="en">🇬🇧</option>
      <option value="ru">🇷🇺</option>
      <option value="ge">🇬🇪</option>
      <option value="hy">🇦🇲</option>
    </select>
  </div>

  <!--   -->
  <div class="buttons">
  <a id="historyBtn" href="history.html">8 Martın Tarixi</a>
  <a id="heroesBtn" href="heroes.html">Qəhrəman Qadınlar</a>
  <a id="flowerBtn" href="flower.html">Hansı Çiçəksən?</a>
  <a id="testBtn" href="test.html">Hansı Güclü Qadınsan?</a>
</div>



<script>
const translations = {
  az: {
    history: "8 Martın Tarixi",
    heroes: "Qəhrəman Qadınlar",
    flower: "Hansı Çiçəksən?",
    test: "Hansı Güclü Qadınsan?"
  },
  en: {
    history: "History of March 8",
    heroes: "Women Who Made History",
    flower: "Which Flower Are You?",
    test: "Which Powerful Woman Are You?"
  },
  ru: {
    history: "История 8 Марта",
    heroes: "Женщины, вошедшие в историю",
    flower: "Какой ты цветок?",
    test: "Какая ты сильная женщина?"
  },
  ge: {
    history: "8 მარტის ისტორია",
    heroes: "ქალები, რომლებმაც ისტორია შექმნეს",
    flower: "რომელი ყვავილი ხარ?",
    test: "რომელი ძლიერი ქალი ხარ?"
  },
  hy: {
    history: "Մարտի 8-ի պատմությունը",
    heroes: "Պատմություն կերտած կանայք",
    flower: "Ո՞ր ծաղիկն ես դու",
    test: "Ո՞ր ուժեղ կինն ես դու"
  }
};

const savedLang = localStorage.getItem("lang") || "az";
document.getElementById("langSelect").value = savedLang;
applyLanguage(savedLang);

document.getElementById("langSelect").addEventListener("change", function(){
  const selectedLang = this.value;
  localStorage.setItem("lang", selectedLang);
  applyLanguage(selectedLang);
});
function applyLanguage(lang) {
  if (!translations[lang]) return;
  
  document.getElementById("historyBtn").textContent = translations[lang].history;
  document.getElementById("heroesBtn").textContent = translations[lang].heroes;
  document.getElementById("flowerBtn").textContent = translations[lang].flower;
  document.getElementById("testBtn").textContent = translations[lang].test;
  
  document.documentElement.lang = lang;
}
</script>

</body>


</html>
